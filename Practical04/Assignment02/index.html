<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Assignment 2 – Multi Image Classification</title>

<!-- TensorFlow -->
<script src="https://unpkg.com/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>

<!-- MobileNet -->
<script src="https://unpkg.com/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* New gradient background */
background: linear-gradient(135deg,#1f4037,#99f2c8);
}

.main-container{
width:500px;
background:#ffffff;
padding:35px;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
}

h2{
color:#2c3e50;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:20px;
}

.image-box{
margin:20px 0;
}

.image-box img{
width:280px;
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
transition:transform .3s;
}

.image-box img:hover{
transform:scale(1.05);
}

.controls{
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:30px;
margin:6px;
font-size:14px;
cursor:pointer;
color:white;
transition:.3s;
}

.prev{
background:#8e44ad;
}

.next{
background:#2980b9;
}

.classify{
background:#e67e22;
}

button:hover{
transform:translateY(-2px);
opacity:0.9;
}

#result{
margin-top:20px;
padding:12px;
background:#f5f6fa;
border-radius:10px;
font-weight:bold;
color:#2c3e50;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="main-container">

<h2>🧠 Image Classification Demo</h2>
<p class="subtitle">Testing Model Accuracy Across Multiple Images</p>

<div class="image-box">
<img id="img" src="img1.jpg">
</div>

<div class="controls">
<button class="prev" onclick="prev()">⟵ Previous</button>
<button class="next" onclick="next()">Next ⟶</button>
<button class="classify" onclick="classifyImage()">🔍 Classify</button>
</div>

<p id="result">Prediction result will appear here...</p>

<div class="footer">
AI Lab Assignment – MobileNet Model
</div>

</div>

<script src="script.js"></script>

</body>
</html>
