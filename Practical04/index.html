<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>MobileNet Image Recognition</title>

<!-- TensorFlow.js -->
<script src="https://unpkg.com/@tensorflow/tfjs@3.21.0/dist/tf.min.js"></script>

<!-- MobileNet -->
<script src="https://unpkg.com/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* New gradient background */
background: linear-gradient(135deg,#667eea,#764ba2);
}

.app-card{
width:520px;
background:#ffffff;
padding:35px;
border-radius:18px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
text-align:center;
}

.header{
font-size:26px;
color:#2c3e50;
margin-bottom:8px;
}

.description{
font-size:14px;
color:#777;
margin-bottom:20px;
}

.image-section{
margin:20px 0;
}

.image-section img{
width:280px;
border-radius:14px;
box-shadow:0 12px 25px rgba(0,0,0,0.15);
transition:transform .3s;
}

.image-section img:hover{
transform:scale(1.05);
}

.controls{
margin-top:15px;
}

button{
padding:12px 22px;
border:none;
border-radius:30px;
margin:6px;
font-size:14px;
cursor:pointer;
color:white;
transition:.3s;
}

.prev{
background:#8e44ad;
}

.next{
background:#27ae60;
}

.classify{
background:#e74c3c;
}

button:hover{
opacity:0.9;
transform:translateY(-2px);
}

#result{
margin-top:20px;
padding:14px;
border-radius:10px;
background:#f4f6fb;
font-size:17px;
font-weight:bold;
color:#2c3e50;
}

.footer{
margin-top:20px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="app-card">

<div class="header">🧠 MobileNet Image Recognition</div>
<div class="description">Testing Image Classification using TensorFlow.js</div>

<div class="image-section">
<img id="img" src="img1.jpg">
</div>

<div class="controls">
<button class="prev" onclick="prev()">⟵ Previous</button>
<button class="next" onclick="next()">Next ⟶</button>
<button class="classify" onclick="classifyImage()">🔍 Classify</button>
</div>

<p id="result">Prediction will appear here...</p>

<div class="footer">
AI Lab – Deep Learning Experiment
</div>

</div>

<script src="script.js"></script>

</body>
</html>
