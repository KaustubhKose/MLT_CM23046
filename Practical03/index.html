<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment 3 – Dense vs LSTM Model Comparison</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@700&display=swap" rel="stylesheet">

<!-- TensorFlow.js -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Space Mono', monospace;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:#ffffff;
padding:30px;
}

.container{
width:900px;
background:#111827;
border-radius:12px;
padding:30px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

h1{
font-family:'Syne',sans-serif;
font-size:28px;
margin-bottom:10px;
}

.subtitle{
color:#9ca3af;
margin-bottom:20px;
}

.controls{
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
margin-right:10px;
cursor:pointer;
font-family:'Space Mono';
font-size:14px;
transition:0.2s;
}

.train{
background:#eab308;
color:black;
}

.reset{
background:#374151;
color:white;
}

button:hover{
opacity:0.85;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:8px;
}

.card h3{
margin-bottom:10px;
}

.metric{
margin-top:6px;
color:#d1d5db;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
padding:10px;
background:#111827;
border:1px solid #374151;
color:white;
border-radius:6px;
resize:none;
}

.predictions{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.pred-box{
background:#1f2937;
padding:20px;
border-radius:8px;
text-align:center;
}

.model-title{
font-size:13px;
color:#9ca3af;
margin-bottom:10px;
}

.verdict{
font-size:28px;
font-family:'Syne';
margin-bottom:6px;
}

.pos{
color:#22c55e;
}

.neg{
color:#ef4444;
}

.footer{
margin-top:20px;
font-size:12px;
color:#9ca3af;
}

@media(max-width:750px){
.grid,
.predictions{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<div class="container">

<h1>Dense vs LSTM Model Comparison</h1>
<p class="subtitle">Train both neural networks and compare their predictions.</p>

<div class="controls">
<button class="train" onclick="trainBoth()">Train Both Models</button>
<button class="reset" onclick="resetAll()">Reset</button>
</div>

<div class="grid">

<div class="card">
<h3>Dense Neural Network</h3>
<div class="metric">Accuracy: <span id="denseAcc">—</span></div>
<div class="metric">Loss: <span id="denseLoss">—</span></div>
</div>

<div class="card">
<h3>LSTM Neural Network</h3>
<div class="metric">Accuracy: <span id="lstmAcc">—</span></div>
<div class="metric">Loss: <span id="lstmLoss">—</span></div>
</div>

</div>

<div class="card">

<h3>Sentence Prediction</h3>

<textarea id="inputText" placeholder="Type a sentence to classify sentiment..."></textarea>

<br><br>

<button class="train" onclick="predictBoth()">Compare Predictions</button>

<div class="predictions">

<div class="pred-box">
<div class="model-title">Dense Model</div>
<div class="verdict" id="denseVerdict">—</div>
<div id="denseConfidence"></div>
</div>

<div class="pred-box">
<div class="model-title">LSTM Model</div>
<div class="verdict" id="lstmVerdict">—</div>
<div id="lstmConfidence"></div>
</div>

</div>

</div>

<div class="footer">
AI Assignment – TensorFlow.js Model Comparison
</div>

</div>

<script src="compare.js"></script>

</body>
</html>
