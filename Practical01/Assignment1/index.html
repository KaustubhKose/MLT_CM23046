<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Regression Line Visualization</title>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(
        135deg,
        #ff0080,
        #7928ca,
        #2afadf,
        #00ff87
      );
      background-size: 300% 300%;
      animation: gradientMove 8s ease infinite;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      background: #ffffff;
      padding: 28px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
      width: 460px;
    }

    h2 {
      margin-top: 0;
      color: #222;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .controls {
      margin: 15px 0;
    }

    input {
      padding: 9px;
      width: 150px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      margin-right: 6px;
    }

    button {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      background: #ff0080;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    button:hover {
      background: #7928ca;
      transform: scale(1.05);
    }

    #output {
      margin-top: 15px;
      padding: 10px;
      background: #f1f4ff;
      border-radius: 10px;
      color: #7928ca;
      font-weight: bold;
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Linear Regression Demo</h2>
    <div class="subtitle">Actual Data vs Regression Line</div>

    <div class="controls">
      <input type="number" id="userInput" placeholder="Enter X value">
      <button onclick="predict()">Predict</button>
    </div>

    <div id="output">Waiting for prediction…</div>

    <div class="hint">📊 Graphs appear in TensorFlow Vis panel (F12)</div>
  </div>

<script>
let model;

async function run() {
  console.log("========== REGRESSION TRAINING ==========");
  console.log("Training data:");
  console.log("X =", [1,2,3,4,5,6]);
  console.log("Y =", [3,5,7,9,11,13]);

  const xs = tf.tensor2d([1,2,3,4,5,6],[6,1]);
  const ys = tf.tensor2d([3,5,7,9,11,13],[6,1]);

  model = tf.sequential();
  model.add(tf.layers.dense({ units: 8, activation: 'relu', inputShape: [1] }));
  model.add(tf.layers.dense({ units: 1 }));

  model.compile({
    optimizer: tf.train.adam(0.05),
    loss: 'meanSquaredError'
  });

  await model.fit(xs, ys, { epochs: 200 });

  console.log("Training complete ✔");

  // Actual points
  const xVals = Array.from(xs.dataSync());
  const yVals = Array.from(ys.dataSync());

  console.log("Actual data points:");
  xVals.forEach((x,i)=>{
    console.log(`(${x}, ${yVals[i]})`);
  });

  // Regression line calculation
  const lineX = [];
  for(let i=1;i<=6;i+=0.1){ lineX.push(i); }

  const lineTensor = tf.tensor2d(lineX,[lineX.length,1]);
  const linePreds = model.predict(lineTensor);
  const lineY = Array.from(linePreds.dataSync());

  console.log("Regression line values:");
  lineX.forEach((x,i)=>{
    console.log(`x=${x.toFixed(1)} → y≈${lineY[i].toFixed(2)}`);
  });

  // Visualization
  const actual = xVals.map((x,i)=>({x:x, y:yVals[i]}));
  const lineData = lineX.map((x,i)=>({x:x, y:lineY[i]}));

  tfvis.render.scatterplot(
    { name: "Actual Data Points" },
    { values: actual },
    { xLabel: "X", yLabel: "Y", height: 300 }
  );

  tfvis.render.linechart(
    { name: "Regression Line" },
    { values: lineData },
    { xLabel: "X", yLabel: "Y", height: 300 }
  );
}

function predict() {
  const val = Number(document.getElementById("userInput").value);
  console.log(`Predicting for X = ${val}`);

  const pred = model.predict(tf.tensor2d([val],[1,1]));
  pred.data().then(res => {
    const y = res[0];
    document.getElementById("output").innerText =
      "Predicted Y ≈ " + y.toFixed(2);

    console.log(`Calculation: y = f(${val}) ≈ ${y.toFixed(2)}`);
  });
}

run();
</script>

</body>
</html>
