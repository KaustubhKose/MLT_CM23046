<!DOCTYPE html>
<html>
<head>
<title>Assignment 3 – CNN vs Dense Model Comparison</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;

/* Animated gradient background */
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:300% 300%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.96);
padding:35px 45px;
border-radius:20px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
text-align:center;
width:520px;
}

h2{
color:#333;
margin-bottom:8px;
}

.subtitle{
color:#666;
font-size:14px;
margin-bottom:20px;
}

.button-group{
margin-top:10px;
}

button{
margin:6px;
padding:12px 20px;
border:none;
border-radius:25px;
font-weight:600;
cursor:pointer;
transition:0.25s;
font-size:14px;
}

.cnn-btn{
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
}

.dense-btn{
background:linear-gradient(45deg,#ff7e5f,#feb47b);
color:white;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 18px rgba(0,0,0,0.2);
}

.note{
margin-top:15px;
font-size:13px;
color:#777;
background:#f3f4f6;
padding:10px;
border-radius:8px;
}

.footer{
margin-top:15px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>🧠 CNN vs Dense Neural Network</h2>
<p class="subtitle">TensorFlow.js Model Comparison Demo</p>

<div class="button-group">
<button class="cnn-btn" onclick="testCNN()">Test CNN (Random Image)</button>
<button class="dense-btn" onclick="testDense()">Test Dense (Random Image)</button>
</div>

<p class="note">Open the browser console to see detailed predictions and probabilities.</p>

<div class="footer">Deep Learning Assignment • TensorFlow.js</div>

</div>

<script>

// ===== Create CNN =====
function createCNN(){
const m = tf.sequential();

m.add(tf.layers.conv2d({
inputShape:[28,28,1],
filters:8,
kernelSize:3,
activation:'relu'
}));

m.add(tf.layers.maxPooling2d({poolSize:2}));

m.add(tf.layers.flatten());

m.add(tf.layers.dense({
units:32,
activation:'relu'
}));

m.add(tf.layers.dense({
units:10,
activation:'softmax'
}));

m.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

return m;
}

// ===== Create Dense =====
function createDense(){

const m = tf.sequential();

m.add(tf.layers.flatten({inputShape:[28,28,1]}));

m.add(tf.layers.dense({
units:64,
activation:'relu'
}));

m.add(tf.layers.dense({
units:10,
activation:'softmax'
}));

m.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

return m;
}

// ===== Synthetic data =====
function createData(){

const xs = tf.randomNormal([500,28,28,1]);
const labels = tf.oneHot(tf.randomUniform([500],0,10,'int32'),10);

return {xs,labels};

}

// ===== Console prediction functions =====
window.predictCNN = async function(tensor){

if(!window.cnnModel){
console.log("CNN model not ready yet.");
return;
}

const pred = window.cnnModel.predict(tensor);
const data = await pred.data();

const digit = data.indexOf(Math.max(...data));

console.log("CNN Prediction:", digit);
console.log("Probabilities:", data);

};

window.predictDense = async function(tensor){

if(!window.denseModel){
console.log("Dense model not ready yet.");
return;
}

const pred = window.denseModel.predict(tensor);
const data = await pred.data();

const digit = data.indexOf(Math.max(...data));

console.log("Dense Prediction:", digit);
console.log("Probabilities:", data);

};

// ===== Test buttons =====
function testCNN(){
const t = tf.randomNormal([1,28,28,1]);
predictCNN(t);
}

function testDense(){
const t = tf.randomNormal([1,28,28,1]);
predictDense(t);
}

// ===== Training =====
async function run(){

tfvis.visor().open();

const {xs,labels} = createData();

const cnn = createCNN();
const dense = createDense();

window.cnnModel = cnn;
window.denseModel = dense;

console.log("Training CNN...");

await cnn.fit(xs,labels,{
epochs:5,
batchSize:64,
validationSplit:0.1,
callbacks: tfvis.show.fitCallbacks(
{name:"CNN Training"},
['loss','accuracy'],
{height:200}
)
});

console.log("Training Dense...");

await dense.fit(xs,labels,{
epochs:5,
batchSize:64,
validationSplit:0.1,
callbacks: tfvis.show.fitCallbacks(
{name:"Dense Training"},
['loss','accuracy'],
{height:200}
)
});

console.log("Training finished!");

}

run();

</script>

</body>
</html>
