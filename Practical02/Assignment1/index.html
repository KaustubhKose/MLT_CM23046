<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TFJS Linear Regression Demo</title>

  <!-- TensorFlow -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* Rich colourful gradient */
      background: linear-gradient(
        135deg,
        #ff6a00,
        #ee0979,
        #7f00ff,
        #00c6ff
      );

      font-family: "Segoe UI", Arial, sans-serif;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 45px;
      border-radius: 22px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      text-align: center;
      width: 560px;
      backdrop-filter: blur(6px);
    }

    h2 {
      margin: 0;
      color: #222;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 6px 0 14px;
      font-size: 14px;
      color: #666;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      background: linear-gradient(90deg, #7f00ff, #00c6ff);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .console {
      margin-top: 18px;
      background: #0d0d0d;
      color: #00ffb3;
      padding: 14px;
      border-radius: 14px;
      height: 160px;
      overflow-y: auto;
      text-align: left;
      font-family: Consolas, monospace;
      font-size: 13px;
      box-shadow: inset 0 0 15px rgba(0,255,180,0.25);
    }

    .footer {
      margin-top: 14px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>Linear Regression with Noise</h2>
    <div class="subtitle">TensorFlow.js • Data + Regression Line</div>

    <div class="badge">Console Output Enabled</div>

    <div class="console" id="consoleBox">
      ▶ Console initialized...
    </div>

    <div class="footer">
      Open DevTools (F12) for full logs
    </div>
  </div>

<script>
/* Dual logger: browser console + on-page console */
function log(msg) {
  console.log(msg);
  const box = document.getElementById("consoleBox");
  box.innerHTML += "<br>▶ " + msg;
  box.scrollTop = box.scrollHeight;
}

async function run() {

  log("Generating data: y = 2x + 1 + noise");

  const xVals = [];
  const yVals = [];

  for (let i = 1; i <= 20; i++) {
    const noise = (Math.random() - 0.5) * 4;
    const y = 2 * i + 1 + noise;

    xVals.push(i);
    yVals.push(y);

    log(`x=${i}, y≈${y.toFixed(2)}`);
  }

  const xs = tf.tensor2d(xVals, [xVals.length, 1]);
  const ys = tf.tensor2d(yVals, [yVals.length, 1]);

  tfvis.render.scatterplot(
    { name: "Original Noisy Data" },
    { values: xVals.map((x,i)=>({x:x, y:yVals[i]})) },
    { xLabel: "X", yLabel: "Y", height: 300 }
  );

  log("Training regression model...");

  window.model = tf.sequential();
  model.add(tf.layers.dense({ units: 1, inputShape: [1] }));

  model.compile({
    optimizer: 'sgd',
    loss: 'meanSquaredError'
  });

  await model.fit(xs, ys, {
    epochs: 120,
    callbacks: tfvis.show.fitCallbacks(
      { name: "Training Loss" },
      ['loss'],
      { height: 200 }
    )
  });

  log("Training completed ✔");

  const lineX = [];
  for (let i = 1; i <= 20; i += 0.1) lineX.push(i);

  const preds = model.predict(tf.tensor2d(lineX, [lineX.length, 1]));
  const lineY = Array.from(preds.dataSync());

  tfvis.render.scatterplot(
    { name: "Original Data with Regression Line" },
    {
      values: [
        xVals.map((x,i)=>({x:x, y:yVals[i]})),
        lineX.map((x,i)=>({x:x, y:lineY[i]}))
      ],
      series: ["Original Data", "Regression Line"]
    },
    { xLabel: "X", yLabel: "Y", height: 300 }
  );

  log("Regression line generated successfully");
}

run();
</script>

</body>
</html>
