<!DOCTYPE html>
<html>
<head>
<title>MNIST Digit Recognition</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;

/* animated gradient background */
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:300% 300%;
animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.95);
padding:35px 45px;
border-radius:20px;
box-shadow:0 20px 45px rgba(0,0,0,0.25);
text-align:center;
width:500px;
}

h2{
color:#333;
margin-bottom:6px;
}

.subtitle{
font-size:14px;
color:#666;
margin-bottom:20px;
}

button{
margin-top:10px;
padding:12px 20px;
border:none;
border-radius:25px;
font-weight:600;
font-size:14px;
cursor:pointer;
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

#output{
margin-top:16px;
font-weight:bold;
font-size:18px;
color:#5a67d8;
background:#f3f4f6;
padding:10px;
border-radius:8px;
}

.note{
font-size:13px;
color:#777;
margin-top:10px;
}

.footer{
margin-top:12px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>🧠 MNIST Digit Recognition</h2>
<p class="subtitle">CNN Model using Synthetic MNIST-like Data</p>

<button onclick="predictDigitUI()">Predict Random Digit</button>

<h3 id="output">Waiting for prediction...</h3>

<p class="note">Open the browser console to see full prediction probabilities.</p>

<div class="footer">Deep Learning Demo • TensorFlow.js</div>

</div>

<script>

let model;

function createModel(){

const model=tf.sequential();

model.add(tf.layers.conv2d({
inputShape:[28,28,1],
filters:8,
kernelSize:3,
activation:'relu'
}));

model.add(tf.layers.maxPooling2d({poolSize:2}));

model.add(tf.layers.flatten());

model.add(tf.layers.dense({
units:32,
activation:'relu'
}));

model.add(tf.layers.dense({
units:10,
activation:'softmax'
}));

model.compile({
optimizer:'adam',
loss:'categoricalCrossentropy',
metrics:['accuracy']
});

return model;

}

async function run(){

console.log("Preparing synthetic MNIST-like data...");

const xs=tf.randomNormal([500,28,28,1]);

const labels=tf.oneHot(
tf.randomUniform([500],0,10,'int32'),10
);

console.log("Input shape:",xs.shape);
console.log("Label shape:",labels.shape);

model=createModel();

console.log("Model Summary:");
model.summary();

console.log("Training started...");

await model.fit(xs,labels,{
epochs:5,
batchSize:64,
callbacks: tfvis.show.fitCallbacks(
{name:"Training Metrics"},
['loss','acc'],
{height:200}
)
});

console.log("Training finished!");

window.predictDigit=function(){

const testImg=tf.randomNormal([1,28,28,1]);

const pred=model.predict(testImg);

pred.print();

const probs=pred.dataSync();

const predictedDigit=probs.indexOf(Math.max(...probs));

console.log("Prediction probabilities:",probs);
console.log("Predicted digit:",predictedDigit);

};

console.log("Use predictDigit() in console.");

}

function predictDigitUI(){

const testImg=tf.randomNormal([1,28,28,1]);

const pred=model.predict(testImg);

pred.data().then(res=>{

const predictedDigit=res.indexOf(Math.max(...res));

document.getElementById("output").innerText=
"Predicted Digit ≈ "+predictedDigit;

console.log("UI Prediction:");
console.log("Probabilities:",res);
console.log("Predicted Digit:",predictedDigit);

});

}

run();

</script>

</body>
</html>
