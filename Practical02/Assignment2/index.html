<!DOCTYPE html>
<html lang="en">
<head>
<title>Real MNIST Digit Recognition</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis@1.5.1"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;

/* New animated gradient background */
background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a6c1ee);
background-size:300% 300%;
animation:gradientMove 10s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(255,255,255,0.95);
padding:35px 45px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
width:380px;
}

h2{
margin-bottom:12px;
color:#333;
}

.subtitle{
font-size:14px;
color:#777;
margin-bottom:20px;
}

canvas{
border:4px solid #444;
border-radius:12px;
background:black;
margin-bottom:15px;
cursor:crosshair;
}

.buttons{
margin-top:10px;
}

button{
padding:10px 18px;
border-radius:25px;
border:none;
font-size:14px;
font-weight:600;
cursor:pointer;
margin:5px;
transition:0.25s;
}

.predict{
background:linear-gradient(45deg,#667eea,#764ba2);
color:white;
}

.clear{
background:#ff6b6b;
color:white;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 8px 15px rgba(0,0,0,0.2);
}

#output{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#5a67d8;
background:#f3f4f6;
padding:10px;
border-radius:8px;
}

.footer{
margin-top:15px;
font-size:12px;
color:#888;
}

</style>
</head>

<body>

<div class="card">

<h2>🧠 MNIST Digit Recognition</h2>
<div class="subtitle">Draw a handwritten digit from 0 – 9</div>

<canvas id="canvas" width="280" height="280"></canvas>

<div class="buttons">
<button class="predict" onclick="predictCanvas()">Predict</button>
<button class="clear" onclick="clearCanvas()">Clear</button>
</div>

<div id="output">Predicted Digit: -</div>

<div class="footer">
Deep Learning Demo • TensorFlow.js
</div>

</div>

<script>

let model, ctx, drawing=false;

const canvas=document.getElementById("canvas");
ctx=canvas.getContext("2d",{willReadFrequently:true});

// canvas setup
ctx.fillStyle="black";
ctx.fillRect(0,0,280,280);

ctx.strokeStyle="white";
ctx.lineWidth=15;
ctx.lineCap="round";

tfvis.visor().open();

// drawing logic
canvas.addEventListener("pointerdown",e=>{drawing=true;draw(e);});
canvas.addEventListener("pointermove",draw);
canvas.addEventListener("pointerup",()=>{drawing=false;ctx.beginPath();});

function draw(e){
if(!drawing) return;

const rect=canvas.getBoundingClientRect();

ctx.lineTo(e.clientX-rect.left,e.clientY-rect.top);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(e.clientX-rect.left,e.clientY-rect.top);
}

function clearCanvas(){
ctx.fillStyle="black";
ctx.fillRect(0,0,280,280);
ctx.beginPath();
document.getElementById("output").innerText="Predicted Digit: -";
}

</script>

</body>
</html>
